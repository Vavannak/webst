<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 2026Store Demo</title>
    <style>
        /* Copy all the styles from index.html or link to external style.css */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0b0f1c, #1a1f33); color: #e0e0ff; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: rgba(10, 15, 30, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(100,150,255,0.2); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(45deg, #a0b0ff, #ffa0c0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { text-decoration: none; color: #c0d0ff; font-weight: 500; padding: 0.5rem 1rem; border-radius: 30px; }
        .nav-links a:hover { background: rgba(255,255,255,0.1); color: white; }
        .auth-container { display: flex; justify-content: center; align-items: center; flex-grow: 1; padding: 2rem; }
        .auth-card { background: rgba(20,30,60,0.7); backdrop-filter: blur(15px); border-radius: 32px; padding: 3rem; width: 100%; max-width: 400px; border: 1px solid #3a4f8c; }
        .auth-card h2 { text-align: center; margin-bottom: 2rem; font-size: 2rem; }
        .auth-card input { width: 100%; padding: 1rem; margin-bottom: 1.5rem; background: rgba(10,15,35,0.8); border: 1px solid #2e3f6e; border-radius: 40px; color: white; }
        .auth-card button { width: 100%; padding: 1rem; background: linear-gradient(45deg, #3a5f9e, #5f7fff); border: none; border-radius: 40px; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .auth-card button:hover { background: linear-gradient(45deg, #4a6fae, #6f8fff); }
        .demo-note { color: #ffaa00; text-align: center; margin: 1rem 0; }
        footer { text-align: center; padding: 2rem; background: rgba(0,0,0,0.2); margin-top: auto; color: #8892b0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🚀 2026Store</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Login</h2>
            <div class="demo-note">🔧 This is a static demo – no actual login.</div>
            <form onsubmit="event.preventDefault(); alert('Demo: no actual login. Redirecting to dashboard...'); window.location.href='dashboard.html';">
                <input type="text" placeholder="Username or Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p style="text-align:center; margin-top:1rem;">Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Store – Static Demo</p>
    </footer>
</body>
</html>
