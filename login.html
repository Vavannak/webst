<!DOCTYPE html>
<html>
<head>
    <title>Login - 2026Store Demo</title>
    <link rel="stylesheet" href="style.css"> <!-- or copy the same style block -->
</head>
<body>
    <nav class="navbar">...</nav>
    <main class="auth-container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
        <div class="auth-card" style="background: rgba(20,30,60,0.7); padding: 3rem; border-radius: 32px; max-width: 400px;">
            <h2>Login (Demo)</h2>
            <p style="color: #ffaa00;">This is a static demo – no actual login.</p>
            <form>
                <input type="text" placeholder="Username or Email" style="width:100%; padding:1rem; margin-bottom:1rem; background:#11172e; border:1px solid #2e3f6e; border-radius:40px; color:white;">
                <input type="password" placeholder="Password" style="width:100%; padding:1rem; margin-bottom:1rem; background:#11172e; border:1px solid #2e3f6e; border-radius:40px; color:white;">
                <button type="button" style="width:100%; padding:1rem; background:linear-gradient(45deg,#3a5f9e,#5f7fff); border:none; border-radius:40px; color:white; font-weight:bold;">Login</button>
            </form>
            <p style="margin-top:1rem;">Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </main>
</body>
</html>
